name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Run Pylint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          # Running pylint on pull requests while ignoring:
      #        - Accessing protected members (W0212)
      #        - Import-related issues due to dynamic or partial dependencies (E0611, E0401)
      #        - Linting only the changed Python files in the PR
      - name: Run Pylint on changed files only
        run: |
          git fetch origin main
          changed_files=$(git diff --name-only origin/main...HEAD | grep '\.py$' || true)
          echo "Changed Python files:"
          echo "$changed_files"
          if [ -n "$changed_files" ]; then
            pylint --disable=W0212,E0611,E0401 $changed_files
          else
            echo "No Python files changed. Skipping pylint."
          fi

  test:
    name: Build & Run Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install setuptools wheel
        run: pip install --upgrade pip setuptools wheel

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate Proto Files
        run: bash ./generate_proto.sh

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@71219540ac7f578e6ea4fc3c17575c0295e56163 # v0.9
        with:
          installMirrorNode: true

      - name: Set environment variables
        run: |
          echo "OPERATOR_ID=${{ steps.solo.outputs.accountId }}"
          echo "OPERATOR_KEY=${{ steps.solo.outputs.privateKey }}"
          echo "ADMIN_KEY=${{ steps.solo.outputs.privateKey }}"
          echo "PUBLIC_KEY=${{ steps.solo.outputs.publicKey }}"

      - name: Install your package
        run: pip install -e .

      - name: Run integration tests
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          ADMIN_KEY: ${{ steps.solo.outputs.privateKey }}
          PUBLIC_KEY: ${{ steps.solo.outputs.publicKey }}
          NETWORK: solo
        run: |
          uv run pytest -m integration

      - name: Run unit tests
        run: |
          uv run pytest -m unit
